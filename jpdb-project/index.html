<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Form - JsonPowerDB</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <script>
        function createPUT(dbName, relName, jsonStr, token) {
            return "{\"token\":\"" + token + "\",\"cmd\":\"PUT\",\"dbName\":\"" + dbName + "\",\"rel\":\"" + relName + "\",\"jsonStr\":" + jsonStr + "}";
        }
        function createGET_BY_KEY(dbName, relName, key, value, token) {
            return "{\"token\":\"" + token + "\",\"cmd\":\"GET_BY_KEY\",\"dbName\":\"" + dbName + "\",\"rel\":\"" + relName + "\",\"jsonStr\":{\"" + key + "\":\"" + value + "\"}}";
        }
        function createUPDATE(dbName, relName, recNo, jsonStr, token) {
            return "{\"token\":\"" + token + "\",\"cmd\":\"UPDATE\",\"dbName\":\"" + dbName + "\",\"rel\":\"" + relName + "\",\"recNo\":" + recNo + ",\"jsonStr\":" + jsonStr + "}";
        }
        function executeCommandAtGivenBaseUrl(request, baseUrl, apiEndPoint) {
            var xhr = new XMLHttpRequest();
            xhr.open("POST", baseUrl + apiEndPoint, false);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.send(request);
            return xhr.responseText;
        }
    </script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .form-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
        }
        .form-title { text-align: center; color: #764ba2; font-weight: 700; font-size: 28px; margin-bottom: 8px; }
        .form-subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
        .form-label { font-weight: 600; color: #444; }
        .form-control { border-radius: 8px; border: 2px solid #e0e0e0; padding: 10px 15px; transition: border-color 0.3s; }
        .form-control:focus { border-color: #764ba2; box-shadow: 0 0 0 3px rgba(118,75,162,0.1); }
        .form-control:disabled { background-color: #f8f9fa; color: #888; }
        .btn-save { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; padding: 10px 24px; font-weight: 600; }
        .btn-save:hover { opacity: 0.9; color: white; }
        .btn-update { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border: none; border-radius: 8px; padding: 10px 24px; font-weight: 600; }
        .btn-update:hover { opacity: 0.9; color: white; }
        .btn-reset { background: #6c757d; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-weight: 600; }
        .status-msg { text-align: center; margin-top: 15px; font-weight: 600; min-height: 24px; }
        .badge-jpdb { background: #764ba2; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; margin-left: 8px; }
    </style>
</head>
<body>
<div class="form-container">
    <h2 class="form-title">🎓 Student Enrollment Form</h2>
    <p class="form-subtitle">Powered by <strong>JsonPowerDB</strong> <span class="badge-jpdb">JPDB</span></p>

    <form id="enrollmentForm">
        <div class="form-group">
            <label class="form-label" for="rollNo">Roll Number <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="rollNo" placeholder="Enter Roll Number (Primary Key)" oninput="checkRollNo()" />
        </div>
        <div class="form-group">
            <label class="form-label" for="studentName">Full Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="studentName" placeholder="Enter Full Name" disabled />
        </div>
        <div class="form-group">
            <label class="form-label" for="studentClass">Class <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="studentClass" placeholder="e.g., 10th, B.Tech 2nd Year" disabled />
        </div>
        <div class="form-group">
            <label class="form-label" for="birthDate">Date of Birth <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="birthDate" disabled />
        </div>
        <div class="form-group">
            <label class="form-label" for="address">Address</label>
            <textarea class="form-control" id="address" rows="2" placeholder="Enter Address" disabled></textarea>
        </div>
        <div class="form-group">
            <label class="form-label" for="enrollDate">Enrollment Date <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="enrollDate" disabled />
        </div>

        <div class="d-flex justify-content-center mt-4" style="gap: 12px;">
            <button type="button" class="btn btn-save" id="btnSave" onclick="saveData()" disabled>💾 Save</button>
            <button type="button" class="btn btn-update" id="btnUpdate" onclick="updateData()" disabled>✏️ Update</button>
            <button type="button" class="btn btn-reset" onclick="resetForm()">🔄 Reset</button>
        </div>
        <div class="status-msg" id="statusMsg"></div>
    </form>
</div>

<script src="app.js"></script>
</body>
</html>
